<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .round-button {
        
        display: inline-block;
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        background-color: #007BFF;
        border: none;
        border-radius: 25px;
        text-align: center;
        cursor: pointer;
    }

    @media (max-width: 600px) {
        .round-button {
        border-radius: 0;
        }
    }   
    .container {
        > p {
            color: red
        }
    }

    .header { grid-area: header; }
    .menu { grid-area: menu; }
    .main { grid-area: main; }
    .left { grid-area: left; }
    .right { grid-area: right; }
    .footer { grid-area: footer; }
    .grid-container {
        display: grid;
        grid-template-areas:
        'header header header'
        'menu   main   main'
        'menu   left   right'
        'footer footer footer'; 
        gap: 10px;
        background-color: red;
        padding: 10px;
    }
    .grid-container > div {
        background-color: #f0f0f0;
        text-align: center;
        padding: 20px 0;
        font-size: 30px;
    }

    .table1 {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    .table1-item {
        background-color: white;
        border: 1px solid #000000;
        padding: 20px;
        font-size: 30px;
        text-align: center;
    }
    .flex1 {
        display: flex;
        background-color: DodgerBlue;
        flex-direction: row-reverse;
        padding: 10px;
        .item{
            background-color:red;
            padding: 20px;
            margin: 5px;
            font: size 30px;
        }
    }

    .flex2 {
        gap: 10px;
        max-width: 500px;
        margin-top: 20px;
        display: flex;
        padding: 10px;
        background-color: DodgerBlue;
        flex-wrap: wrap-reverse;
        flex-direction: row-reverse;
        justify-content: left;
        .item {
            background-color: white;
            font-size: 30px;
            padding: 20px;

        }
    }

    .perfect-center {
        max-width: 500px;
        margin-top: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100px;
        background-color: DodgerBlue;
        .item {
            background-color: white;
            font-size: 30px;
            padding: 20px;
        }
    }
</style>
<body>
    <button class="round-button">Login</button>
    <div class="container">
        <p>CAMT 1</p>
            <div>
                <p>CAMT 2</p>
            </div>
        <p>CAMT 3</p>
    </div>
    <div class="grid-container">
        <div class="header">CAMT CMU HEADEER</div>
        <div class="menu">Menu</div>
        <div class="main">Main</div>
        <div class="left">Left</div>
        <div class="right">Right</div>
        <div class="footer">CAMT CMU Footer</div>
    </div>
     <div class="table1">
        <div class="table1-item"> 1 </div>
        <div class="table1-item"> 2 </div>
        <div class="table1-item"> 3 </div>
        <div class="table1-item"> 4 </div>
        <div class="table1-item"> 5 </div>
        <div class="table1-item"> 6 </div>
        <div class="table1-item"> 7 </div>
    <div class="table1-item"> 8 </div>
    </div>
    <div class="flex1">
        <div class="item"> 1 </div>
        <div class="item"> 2 </div>
        <div class="item"> 3 </div>
        <div class="item"> 4 </div>
    </div>
    <div class="flex2">
        <div class="item"> 1 </div>
        <div class="item"> 2 </div>
        <div class="item"> 3 </div>
        <div class="item"> 4 </div>
        <div class="item"> 5 </div>
        <div class="item"> 6 </div>
        <div class="item"> 7 </div>
        <div class="item"> 8 </div>
        <div class="item"> 9 </div>
        <div class="item"> 10 </div>
        <div class="item"> 11 </div>
        <div class="item"> 12 </div>
        <div class="item"> 13 </div>
    </div>
    <div class="perfect-center">
        <div class="item">:3</div>
    </div>
</body>
</html>
